<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dictionary</title>
    <meta
      name="description"
      content="The fastest way to look up words. A clean, ad-free dictionary experience providing precise definitions, origins, and thesaurus entries at your fingertips. Simple, fast, and reliable."
    />
    <link
      rel="icon"
      type="image/png"
      href="favicon/favicon-96x96.png"
      sizes="96x96"
    />
    <link rel="icon" type="image/svg+xml" href="favicon/favicon.svg" />
    <link rel="shortcut icon" href="favicon/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="favicon/apple-touch-icon.png"
    />
    <meta name="apple-mobile-web-app-title" content="Dictionary" />
    <link rel="manifest" href="favicon/site.webmanifest" />
  </head>
  <body class="bg-neutral-0">
    <header>
      <nav
        class="flex justify-between items-center sm:py-14.5 sm:px-10 p-6 max-w-184 mx-auto"
      >
        <a
          class="focus-visible:outline-2 focus-visible:outline-purple-500 focus-visible:outline-offset-3 rounded"
          href="https://dictionary-web-app-rho-three.vercel.app/"
        >
          <img
            src="/src/assets/images/logo.svg"
            alt="Logo"
            class="w-7 xs:w-8"
          />
        </a>

        <div class="flex items-center gap-4 sm:gap-6">
          <div
            class="relative inline-block text-left"
            id="font-dropdown-wrapper"
          >
            <button
              id="font-button"
              type="button"
              aria-haspopup="listbox"
              aria-expanded="false"
              class="flex items-center gap-4 bg-transparent font-bold text-neutral-800 cursor-pointer sm:text-lg text-sm group rounded-md focus-visible:outline-2 focus-visible:outline-purple-500 focus-visible:outline-offset-3"
            >
              <span id="current-font-label">Sans Serif</span>
              <svg
                class="w-3 h-3 text-purple-500 transition-transform duration-200"
                id="dropdown-arrow"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="3"
                  d="M19 9l-7 7-7-7"
                />
              </svg>
            </button>

            <ul
              id="font-options"
              role="listbox"
              tabindex="-1"
              class="absolute right-0 mt-4 w-30 sm:w-45 bg-neutral-0 rounded-2xl sm:p-6 px-4 py-6 hidden flex-col gap-4 z-50"
            >
              <li
                role="option"
                data-value="font-inter"
                data-label="Sans Serif"
                tabindex="0"
                class="cursor-pointer font-inter font-bold text-neutral-800 sm:text-lg text-sm hover:text-purple-500 transition-colors outline-none focus:text-purple-500"
              >
                Sans Serif
              </li>
              <li
                role="option"
                data-value="font-lora"
                data-label="Serif"
                tabindex="0"
                class="cursor-pointer font-lora font-bold text-neutral-800 sm:text-lg text-sm hover:text-purple-500 transition-colors outline-none focus:text-purple-500"
              >
                Serif
              </li>
              <li
                role="option"
                data-value="font-inconsolata"
                data-label="Mono"
                tabindex="0"
                class="cursor-pointer font-inconsolata font-bold text-neutral-800 sm:text-lg text-sm hover:text-purple-500 transition-colors outline-none focus:text-purple-500"
              >
                Mono
              </li>
            </ul>
          </div>

          <div class="w-px h-8 bg-neutral-200"></div>

          <div class="flex items-center gap-2.5 sm:gap-5">
            <label for="checkbox" class="switch">
              <input id="theme-toggle" type="checkbox" name="checkbox" />
              <span class="slider"></span>
            </label>

            <div class="text-purple-500">
              <svg
                width="22"
                height="22"
                viewBox="0 0 22 22"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  fill-rule="evenodd"
                  clip-rule="evenodd"
                  d="M0.750002 10.199C0.748458 12.5783 1.55169 14.8883 3.02914 16.7533C4.50659 18.6183 6.57139 19.9288 8.88799 20.4718C11.2045 21.0147 13.6366 20.7582 15.789 19.744C17.9412 18.7297 19.6873 17.0173 20.7431 14.8852C11.2942 14.8852 6.60799 10.1979 6.60799 0.75C4.84842 1.62311 3.36767 2.97033 2.33266 4.63981C1.29765 6.3093 0.749502 8.23469 0.750002 10.199Z"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <main
      id="dictionary-app"
      class="font-inter max-w-184 mx-auto px-6 sm:px-10 pb-16 sm:pb-28"
    >
      <form id="form" action="#" class="relative">
        <label for="search" class="sr-only">Search for a word</label>
        <input
          id="search"
          class="w-full py-3.5 px-6 sm:py-5 rounded-2xl font-bold text-base sm:text-xl bg-neutral-100 text-neutral-800 placeholder-neutral-400 focus:outline-none focus:ring-2 focus:ring-purple-500 caret-purple-500"
          type="search"
          name="search"
          placeholder="Search for any word..."
        />

        <img
          class="absolute right-4 sm:right-6 top-1/2 transform -translate-y-1/2 pointer-events-none"
          src="./src/assets/images/icon-search.svg"
          alt=""
        />
        <span
          id="errorMessage"
          class="text-sm sm:text-xl font-normal text-red-500 absolute left-0 -bottom-6 sm:-bottom-7"
        >
        </span>
      </form>

      <div class="word-info"></div>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
